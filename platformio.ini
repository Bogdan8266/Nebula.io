; ╔══════════════════════════════════════════════╗
; ║        NEBULA OS — PlatformIO Config         ║
; ║    Hi-Fi Cyberdeck Player | ESP32 + E-Ink    ║
; ╚══════════════════════════════════════════════╝

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; ── Upload & Monitor ────────────────────────────
monitor_speed = 115200
upload_speed  =3000000 ; Можна пришвидшити прошивку

; ── OTA Upload ─────────────────────────────────
; Для OTA прошивки потрібно вказати IP адресу пристрою:
; pio run --environment esp32s3 --target upload --upload-port 192.168.X.X
;
; Або додати сюди (раскоментуй і зміни IP):
upload_protocol = espota
upload_port = 192.168.31.7

; ── Build Flags ──────────────────────────────────
build_flags = 
	-D LV_CONF_INCLUDE_SIMPLE
    ; USB OTG Mode (Speed & MSC support)
    -D ARDUINO_USB_MODE=0
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MSC_ON_BOOT=1
    -D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue


; ── Memory & Partitions (16MB Fix) ──────────────
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv


board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi

; ── Libraries ────────────────────────────────────
lib_deps =
    adafruit/Adafruit BusIO @ ^1.14.1
    ZinggJM/GxEPD2 @ ^1.6.2
    adafruit/Adafruit GFX Library @ ^1.11.0
    olikraus/U8g2_for_Adafruit_GFX @ ^1.8.0
    bitbank2/JPEGDEC @ ^1.8.4
    https://github.com/pschatzmann/arduino-audio-tools.git
    https://github.com/pschatzmann/arduino-libfoxenflac.git
    electroniccats/MPU6050 @ ^1.3.1
    fastled/FastLED @ ^3.6.0
    ricmoo/QRCode @ ^0.0.1
